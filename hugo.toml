baseURL = "/"
languageCode = "ru-RU"
defaultContentLanguage = "ru"
title = "Моё портфолио"
theme = "blowfish"

[params]
  colorScheme = "ocean"
  description = "Моё портфолио на Hugo"
  showAppearanceSwitcher = true
  defaultAppearance = "light"
  autoSwitchAppearance = true
  
  [params.author]
    name = "Дарья"
    image = "images/avatar.jpg"
    headline = "Студентка ITMO"
    bio = "Учусь создавать сайты на Hugo"
    
  [params.homepage]
    layout = "profile"
    showRecent = true
    recentLimit = 3
    
  [params.article]
    showDate = true
    showReadingTime = true
    showAuthor = true
    
  [params.list]
    showCards = true
    groupByYear = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true